  - { id: social-relations, title: 'Social relationships (laguna, bizilaguna, ezaguna, ikaskidea, lankidea, koadrila)' }
  - { id: professions-extended, title: 'Professions (expanded: erizaina, polizia, kazetaria, dendaria, mekanikaria)' }
  - { id: third-person-introductions, title: 'Introducing another person (Hau X da, Bera ... da)' }
  - { id: daily-routine-third-person, title: 'Other people''s routine and profession (Bera medikua da, ospitalean lan egiten du)' }
