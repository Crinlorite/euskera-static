  - { id: nondik-ablative, title: 'The NONDIK case: -tik (origin, source of movement) — Etxetik nator' }
  - { id: instrumental-z, title: 'Instrumental -z for transport and manner (oinez, kotxez, autobusez, trenez, bizikletaz)' }
  - { id: route-instructions, title: 'Route instructions (jo ezkerrera, segi aurrera, igo, jaitsi, zeharkatu)' }
