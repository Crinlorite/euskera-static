  - { id: spatial-positions, title: 'Spatial positions (aurrean, atzean, ondoan, gainean, azpian, artean, ezkerrean, eskuinean)' }
  - { id: existence-bada, title: 'Existence with bada/badago (Ba al dago…?, Bai badago, Ez ez dago…rik)' }
  - { id: spatial-adverbs, title: 'Adverbs of place hemen / hor / han and demonstratives honetan / horretan / hartan' }
  - { id: movement-verbs, title: 'Movement verbs joan, etorri, ibili (synthetic: noa/zoaz, nator/zatoz, nabil/zabiltza)' }
