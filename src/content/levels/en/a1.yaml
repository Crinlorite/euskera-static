code: a1
name: Level A1
description: Beginner level. Basic comprehension and production in everyday situations.
order: 1
status: active
beta: false
curriculum:
  # Greetings and social communication
  - { id: greetings, title: Greetings and farewells (kaixo, hepa, agur, gero arte) }
  - { id: courtesy, title: Courtesy and the classroom (mesedez, eskerrik asko, ez horregatik, errepikatu) }
  # Introductions and identity
  - { id: introductions, title: 'Introductions (Ni X naiz, Nire izena X da, Zein da zure izena?)' }
  - { id: personal-data, title: Personal details (izena, abizena, adina, jaioterria, telefonoa, emaila) }
  - { id: ages, title: 'Age: ... urte ditut/ditu/dituzte' }
  # Basic verbs
  - { id: izan-nor, title: 'The verb "izan" (NOR): naiz, haiz, da, gara, zara, zarete, dira' }
  - { id: izan-negation, title: 'Negation: ez placed before the verb (ez naiz, ez da, ez gara)' }
  - { id: egon-nor, title: 'The verb "egon" (NOR): nago, hago, dago, gaude, zaude, zaudete, daude' }
  - { id: izan-vs-egon, title: 'Distinguishing izan/egon: quality vs temporary state' }
  - { id: ukan-basic, title: 'The verb "ukan" (NOR-NORK) — to have: dut, duzu, du, dugu, duzue, dute' }
  - { id: ukan-plural-objects, title: 'Plural object in ukan: ditut, dituzu, ditu, ...' }
  - { id: partitive-rik, title: 'Partitive -rik in negation with an indefinite object' }
  - { id: gustatzen-zait, title: '"Gustatzen zait/zaio" — verb of liking (introduction to NOR-NORI)' }
  # Pronouns and demonstratives
  - { id: personal-pronouns, title: Personal pronouns (ni, hi, zu, hura, gu, zuek, haiek) }
  - { id: demonstratives, title: Demonstratives hau/hori/hura and plurals hauek/horiek/haiek }
  - { id: possessives, title: Possessives (nire, hire, zure, haren/bere, gure, zuen, haien/beren) }
  # Family
  - { id: family-types, title: Types of family (guraso bakarrekoa, bikote mistoa, ezkonduta) }
  - { id: family-basics, title: Family (aita, ama, seme, alaba, anaia, arreba/ahizpa) }
  - { id: family-extended, title: Extended family (aitona, amona, osaba, izeba, lehengusu, iloba) }
  # Origin, residence, location
  - { id: origin-koa, title: 'Origin: Nongoa zara? → X-koa naiz' }
  - { id: residence-an, title: 'Residence: Non bizi zara? → X-(e)an bizi naiz' }
  - { id: countries-nationalities, title: Common countries and nationalities }
  - { id: companions-rekin, title: 'Comitative: Norekin bizi zara? → X-(r)ekin' }
  # Cases of Basque
  - { id: nor-case, title: 'The NOR case (absolutive): -A singular, -AK plural' }
  - { id: nork-case, title: 'The NORK case (ergative): -AK singular, -EK plural' }
  - { id: nori-case, title: 'The NORI case (dative): -ARI singular, -EI plural' }
  - { id: noren-case, title: 'NOREN genitive: possession -(r)en (Beñaten aita)' }
  - { id: locative-non, title: 'NON locative: -(e)n (Bilbon, Donostian, Madrilen)' }
  # Descriptions and professions
  - { id: physical-description, title: 'NOLAKOA da? — physical description with izan + adjective+A' }
  - { id: mental-states, title: 'NOLA dago? — temporary state with egon + adjective (pozik, triste)' }
  - { id: hair-eyes, title: 'Hair and eyes (ile beltza, begi urdinak, ile motza/luzea)' }
  - { id: character, title: 'Character (alaia, jatorra, isila, langilea, lasaia)' }
  - { id: professions, title: 'Professions (ikaslea, irakaslea, sukaldaria, mediku, langabea, jubilatua)' }
