  - { id: home-rooms, title: 'Rooms of the house (sukaldea, logela, komuna, egongela, sarrera, korridorea)' }
  - { id: furniture, title: 'Furniture and household objects (mahaia, aulkia, ohea, armairua, sofa, hozkailua)' }
