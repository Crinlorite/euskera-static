  - { id: colors, title: Colors (zuria, beltza, gorria, urdina, horia, berdea) }
  - { id: days-of-week, title: 'Days of the week (astelehena → igandea)' }
  - { id: months, title: 'Months of the year (urtarrila → abendua)' }
  - { id: seasons, title: Seasons (udaberria, uda, udazkena, negua) }
  - { id: time-basics, title: 'Telling the time (Hamabiak dira, sei eta erdiak)' }
  - { id: time-expressions, title: 'Time: lehen/orain/gero, atzo/gaur/bihar/etzi' }
  - { id: body-parts, title: Parts of the body (burua, eskua, hanka, sabela) }
  - { id: health-basics, title: 'Basic health (... mina daukat, sukarra, eztula)' }
  - { id: clothes, title: Basic clothing (alkandora, galtza, soineko, jertse, zapatak) }
  - { id: places-town, title: 'Places in town (taberna, merkatua, hondartza, eliza, banketxea)' }
  - { id: directions, title: 'Directions (jo ezkerrera, segi aurrera, gainean/azpian)' }
  - { id: food-bar, title: 'Bar and food (kafe hutsa, kafesnea, zuritoa, ogitartekoa, sagardoa)' }
  - { id: meals, title: 'Meals of the day (gosaria, hamaiketakoa, bazkaria, afaria)' }
  - { id: common-verbs, title: 'Basic verbs (sartu/irten, jan, edan, ikusi, joan, etorri)' }
  - { id: questions-basic, title: 'Basic questions (zer, nor, non, noiz, zenbat, nola)' }
  - { id: celebrations, title: 'Congratulations (Zorionak, Urte askotarako, Topa egin)' }
